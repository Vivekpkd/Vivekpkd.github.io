name: Build and deploy Jekyll site

# Give the workflow permission to push files
permissions:
  contents: write
  pages: write

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # keep default persist-credentials (true) so GITHUB_TOKEN is available for pushes

      - name: Setup Ruby 3.2
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'

      - name: Install bundler and dependencies
        run: |
          gem install bundler -v 4.0.3
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Build site with Jekyll
        run: bundle exec jekyll build --destination ./_site

      - name: Deploy to GitHub Pages (gh-pages branch) using GITHUB_TOKEN
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
